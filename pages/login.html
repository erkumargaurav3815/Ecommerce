<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link rel="icon" href="../assets/images/login.jpeg" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>

  <body class="bg-secondary-subtle">
    <div
      class="min-vh-100 d-flex justify-content-center align-items-center p-3">
      <div class="card shadow p-4 w-100" style="max-width: 420px">
        <div class="d-flex justify-content-center mb-4">
          <img
            src="../assets/images/login.jpeg"
            alt="logo"
            class="img-fluid"
            style="width: 150px" />
        </div>

        <h1 class="text-center mb-2">Welcome back!</h1>
        <p class="text-center text-muted mb-4">
          Sign in to continue to your account
        </p>

        <form>
          <div class="mb-3">
            <label class="form-label">Email</label>

            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>

              <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>

            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>

              <input
                type="password"
                name="password"
                class="form-control"
                minlength="8"
                placeholder="Enter your password"
                required />
            </div>
          </div>

          <div class="text-end mb-3">
            <a href="#" class="text-decoration-none small">
              Forgot Password?
            </a>
          </div>

          <a href="./home.html">
            <button class="btn btn-primary w-100">Log In</button>
          </a>

          <div class="d-flex align-items-center gap-2 my-4">
            <hr class="flex-grow-1" />
            <span class="text-muted small">or continue with</span>
            <hr class="flex-grow-1" />
          </div>

          <div class="row g-2">
            <div class="col">
              <button class="btn btn-light border w-100 py-2">
                <img
                  src="../assets/images/google.png"
                  width="22"
                  height="22"
                  alt="Google" />
              </button>
            </div>

            <div class="col">
              <button class="btn btn-light border w-100 py-2">
                <img
                  src="../assets/images/microsoft.png"
                  width="22"
                  height="22"
                  alt="Microsoft" />
              </button>
            </div>

            <div class="col">
              <button class="btn btn-light border w-100 py-2">
                <img
                  src="../assets/images/apple.png"
                  width="22"
                  height="22"
                  alt="Apple" />
              </button>
            </div>
          </div>

          <p class="text-center small mt-4 mb-0">
            Don't have an account?
            <a href="./signup.html" class="text-decoration-none"> Sign Up </a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
