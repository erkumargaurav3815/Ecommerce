<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <link rel="icon" href="../assets/images/signup.jpeg" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet" />
  </head>

  <body class="bg-secondary-subtle">
    <div
      class="min-vh-100 d-flex justify-content-center align-items-center p-3">
      <div class="card shadow rounded-4 w-100" style="max-width: 420px">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <img
              src="../assets/images/signup.jpeg"
              alt="logo"
              class="img-fluid"
              style="width: 150px" />
          </div>

          <h1 class="text-center fs-4 fw-bold">Create your account</h1>

          <p class="text-center text-secondary">Make your first step!</p>

          <form id="signupForm">
            <div class="mb-3">
              <label class="form-label"> Full Name </label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person-fill"></i>
                </span>

                <input
                  type="text"
                  class="form-control"
                  placeholder="Enter your Full Name"
                  required />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label"> Phone Number </label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-telephone-fill"></i>
                </span>

                <input
                  type="tel"
                  class="form-control form-control-lg rounded-3"
                  name="phone"
                  placeholder="Enter phone number"
                  pattern="[0-9]{10}"
                  maxlength="10"
                  required
                  oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label"> Email </label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-envelope"></i>
                </span>

                <input
                  type="email"
                  class="form-control"
                  placeholder="Enter your email"
                  required />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label"> Password </label>

              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock"></i>
                </span>

                <input
                  type="password"
                  minlength="8"
                  class="form-control"
                  placeholder="Enter your password"
                  required />
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">
              Sign Up
            </button>

            <div
              class="d-flex align-items-center gap-2 my-4 text-secondary small">
              <hr class="flex-grow-1" />

              <span> or continue with </span>

              <hr class="flex-grow-1" />
            </div>

            <div class="row g-2">
              <div class="col">
                <button type="button" class="btn btn-light border w-100 py-2">
                  <img src="../assets/images/google.png" width="22" />
                </button>
              </div>

              <div class="col">
                <button type="button" class="btn btn-light border w-100 py-2">
                  <img src="../assets/images/microsoft.png" width="22" />
                </button>
              </div>

              <div class="col">
                <button type="button" class="btn btn-light border w-100 py-2">
                  <img src="../assets/images/apple.png" width="22" />
                </button>
              </div>
            </div>

            <p class="text-center mt-4 mb-0 text-secondary">
              Already have an account?

              <a href="./login.html" class="text-decoration-none"> Login </a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
